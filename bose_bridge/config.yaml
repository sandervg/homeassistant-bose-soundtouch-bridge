name: "Bose SoundTouch Bridge"
description: "Brings preset buttons back to life on Bose SoundTouch speakers after the Bose cloud retirement (2026). Maps each preset to a stream URL and pushes via local UPnP."
version: "1.6.1"
slug: "bose_bridge"
url: "https://github.com/kom101/homeassistant-bose-soundtouch-bridge"
init: false
arch:
  - amd64
  - aarch64
boot: auto
startup: services
host_network: true
services:
  - mqtt:need
options:
  speakers: []
schema:
  bose_host: str?
  sync_presets_on_startup: bool?
  preset_1_url: str?
  preset_2_url: str?
  preset_3_url: str?
  preset_4_url: str?
  preset_5_url: str?
  preset_6_url: str?
  speakers:
    - host: str
      name: str?
      sync_presets_on_startup: bool?
      preset_1_url: str?
      preset_2_url: str?
      preset_3_url: str?
      preset_4_url: str?
      preset_5_url: str?
      preset_6_url: str?
